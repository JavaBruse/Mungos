logging:
  level:
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    io.netty: INFO
    io.grpc: INFO
    io.grpc.netty.shaded: INFO
server:
  port: ${CORE_PORT}
  servlet:
    context-path: /

spring:
  jackson:
    time-zone: ${TZ:Europe/Moscow}
  application:
    name: core
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

token:
  signing:
    key: ${JWT_SECRET:}


admin:
  username: ${ADMIN_USERNAME}
  password: ${ADMIN_PASSWORD}

metric:
  port: ${METRICS_PORT}

sniffer:
  host: mungos-sniffer
  port: ${SNIFFER_GRPC_PORT}
  master-key: ${DEFAULT_MASTER_KEY}