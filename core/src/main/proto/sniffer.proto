syntax = "proto3";

package sniffer;

option go_package = "./sniffer;sniffer";
option java_package = "com.JavaBruse.proto";
option java_multiple_files = true;

// Сервис сниффера
service SnifferService {
  // Первое соединение (регистрация) - используем мастер-ключ
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Основной RPC для всех запросов
  rpc GetStats(StatsRequest) returns (StatsResponse);

  // Проверка соединения
  rpc Ping(PingRequest) returns (PingResponse);

  rpc GetFilteredTraffic(TrafficFilterRequest) returns (stream TrafficPacket);
}

// Запрос с фильтрами
message TrafficFilterRequest {
  string session_key = 1;
  FilterExpression filter = 2;
  int32 limit = 3;          // сколько пакетов вернуть
  int32 offset = 4;         // для пагинации
}

// Структура фильтра
message FilterExpression {
  repeated string protocols = 1;      // ["TCP", "UDP", "HTTP"]
  repeated int32 ports = 2;           // [80, 443, 53]
  repeated string ips = 3;            // ["192.168.1.1", "10.0.0.1"]
  int64 start_time = 4;                // с какого времени
  int64 end_time = 5;                  // по какое время
  string text_search = 6;              // поиск по содержимому
  map<string, string> custom = 7;      // кастомные фильтры
}

// Пакет данных
message TrafficPacket {
  int64 timestamp = 1;
  string protocol = 2;
  int32 src_port = 3;
  int32 dst_port = 4;
  string src_ip = 5;
  string dst_ip = 6;
  int32 length = 7;
  bytes payload = 8;           // содержимое пакета
  map<string, string> headers = 9;    // для HTTP заголовков
  string method = 10;          // для HTTP (GET, POST)
  string uri = 11;             // для HTTP
  int32 status = 12;           // для HTTP ответов
  string dns_query = 13;       // для DNS
  string dns_answer = 14;      // для DNS
  // можно добавлять дальше
}


// Сообщения для регистрации
message RegisterRequest {
  string master_key = 1;        // Мастер-ключ из конфига
  string sniffer_id = 2;        // ID сниффера (например, "office-1")
  string session_key = 3;
}

message RegisterResponse {
  bool success = 1;
  string session_key = 2;       // Новый ключ для дальнейшей работы
  string message = 3;
  string server_certificate = 4; // Изменено с certificate на server_certificate
}

// Запрос статистики
message StatsRequest {
  string session_key = 1;        // Ключ сессии (после регистрации)
  string period = 2;             // "1h", "24h", "7d"
}

// Ответ со статистикой
message StatsResponse {
  int64 packets_count = 1;
  int64 bytes_total = 2;
  map<string, int64> protocols = 3;     // TCP, UDP, ICMP -> count
  map<string, int64> applications = 4;   // HTTPS, DNS, SSH -> count
  string error = 5;
}

// Ping сообщения
message PingRequest {
  string session_key = 1;
  string message = 2;            // "ping" от Java
}

message PingResponse {
  string message = 3;            // "pong" от Go
  int64 timestamp = 4;
}