syntax = "proto3";

package sniffer;

option go_package = "./core/grpc/proto;snifferpb";

service SnifferService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc GetMetrics(MetricsRequest) returns (MetricsResponse);
  rpc Ping(PingRequest) returns (PingResponse);
  rpc GetFilteredTraffic(TrafficFilterRequest) returns (stream TrafficPacket);
  rpc GetPacketPayload(PayloadRequest) returns (PayloadResponse);
}


message PayloadRequest {
  string session_key = 1;
  string packet_id = 2;
}

message PayloadResponse {
  bytes payload = 1;
}

message TrafficFilterRequest {
  string session_key = 1;
  FilterExpression filter = 2;
  int32 limit = 3; 
  int32 offset = 4;
}

message FilterExpression {
  repeated string protocols = 1;      // ["TCP", "UDP", "HTTP"]
  repeated int32 ports = 2;           // [80, 443, 53]
  repeated string ips = 3;            // ["192.168.1.1", "10.0.0.1"]
  int64 start_time = 4;                // с какого времени
  int64 end_time = 5;                  // по какое время
  string text_search = 6;              // поиск по содержимому
  map<string, string> custom = 7;      // кастомные фильтры
}

message TrafficPacket {
  string packet_id = 1;
  int64 timestamp = 2;
  string protocol = 3;
  int32 src_port = 4;
  int32 dst_port = 5;
  string src_ip = 6;
  string dst_ip = 7;
  int32 length = 8;
  bytes payload = 9;
  map<string, string> headers = 10;
  string method = 11;
  string uri = 12;
  int32 status = 13;
  string dns_query = 14;
  string dns_answer = 15;
  int32 ttl = 16;
  string tcp_flags = 17;
}

message RegisterRequest {
  string master_key = 1;
  string sniffer_id = 2;
  string session_key = 3;
}

message RegisterResponse {
  bool success = 1;
  string session_key = 2;
  string message = 3;
  string server_certificate = 4;
}

message MetricsRequest {
  string session_key = 1;
}

message MetricsResponse {
  // === Основные счетчики трафика ===
  int64 packets_count = 1;           // общее количество пакетов
  int64 bytes_total = 2;              // общий трафик в байтах
  map<string, int64> protocols = 3;   // статистика по протоколам (TCP, UDP, ICMP...)
  map<string, int64> applications = 4; // статистика по приложениям (HTTP, DNS, HTTPS...)
  string error = 5;                    // ошибка, если есть

  // === Health метрики системы ===
  double cpu_usage = 6;                // загрузка CPU (0.0 - 100.0)
  int64 memory_bytes = 7;              // используемая память в байтах
  int64 memory_total_bytes = 8;         // всего доступно памяти в байтах
  int64 uptime_seconds = 9;             // время работы сниффера в секундах
  int64 packets_dropped = 10;           // сколько пакетов потеряно
  string version = 11;                   // версия сниффера
  string go_version = 12;                // версия Go
  int32 num_goroutines = 13;             // количество горутин
  string device = 14;                    // сетевой интерфейс (eth0, lo...)
  bool promisc_mode = 15;                // promiscuous mode включен?
  string filter = 16;                     // BPF фильтр

  // === Временная аналитика ===
  int64 packets_per_second = 20;         // текущая скорость пакетов (пакетов/сек)
  double bytes_per_second = 21;           // текущая скорость трафика (байт/сек)
  int64 packets_last_minute = 22;         // пакеты за последнюю минуту
  int64 bytes_last_minute = 23;            // трафик за последнюю минуту (байт)

  // === TCP специфика ===
  int64 tcp_connections = 30;              // активные TCP соединения
  int64 tcp_syn_packets = 31;              // SYN пакеты (новые соединения)
  int64 tcp_fin_packets = 32;              // FIN пакеты (закрытые соединения)
  int64 tcp_rst_packets = 33;              // RST пакеты (сброшенные/ошибочные)
  int64 tcp_retransmissions = 34;           // ретрансмиссии (проблемы сети)

  // === Размеры пакетов ===
  double avg_packet_size = 40;              // средний размер пакета в байтах
  int64 min_packet_size = 41;               // минимальный размер пакета
  int64 max_packet_size = 42;               // максимальный размер пакета
  map<int32, int64> packet_size_distribution = 43;  // распределение по размерам
  // ключи: 64, 128, 256, 512, 1024, 1500 - количество пакетов каждого размера

  // === IP специфика ===
  int64 ipv4_packets = 50;                   // IPv4 трафик
  int64 ipv6_packets = 51;                   // IPv6 трафик
  int64 fragmented_packets = 52;             // фрагментированные пакеты
  int64 malformed_packets = 53;               // битые/ошибочные пакеты

  // === Топ портов ===
  map<int32, int64> top_src_ports = 60;       // топ источников по портам (max 10)
  map<int32, int64> top_dst_ports = 61;       // топ назначений по портам (max 10)

  // === Топ IP адресов ===
  map<string, int64> top_src_ips = 70;        // кто больше всего отправляет (max 10)
  map<string, int64> top_dst_ips = 71;        // кому больше всего отправляют (max 10)

  // === География (если будет реализовано) ===
  map<string, int64> geo_countries = 80;      // распределение по странам (ISO коды)
}

message PingRequest {
  string session_key = 1;
  string message = 2;
}

message PingResponse {
  string message = 1;
  int64 timestamp = 2;
}