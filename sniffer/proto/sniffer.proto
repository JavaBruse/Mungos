syntax = "proto3";

package sniffer;

option go_package = "./core/grpc/proto;snifferpb";

service SnifferService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc GetStats(StatsRequest) returns (StatsResponse);
  rpc Ping(PingRequest) returns (PingResponse);
  rpc GetFilteredTraffic(TrafficFilterRequest) returns (stream TrafficPacket);
  rpc GetPacketPayload(PayloadRequest) returns (PayloadResponse);
}


message PayloadRequest {
  string session_key = 1;
  string packet_id = 2;
}

message PayloadResponse {
  bytes payload = 1;
}

message TrafficFilterRequest {
  string session_key = 1;
  FilterExpression filter = 2;
  int32 limit = 3; 
  int32 offset = 4;
}

message FilterExpression {
  repeated string protocols = 1;      // ["TCP", "UDP", "HTTP"]
  repeated int32 ports = 2;           // [80, 443, 53]
  repeated string ips = 3;            // ["192.168.1.1", "10.0.0.1"]
  int64 start_time = 4;                // с какого времени
  int64 end_time = 5;                  // по какое время
  string text_search = 6;              // поиск по содержимому
  map<string, string> custom = 7;      // кастомные фильтры
}

message TrafficPacket {
  string packet_id = 1;
  int64 timestamp = 2;
  string protocol = 3;
  int32 src_port = 4;
  int32 dst_port = 5;
  string src_ip = 6;
  string dst_ip = 7;
  int32 length = 8;
  bytes payload = 9;
  map<string, string> headers = 10;
  string method = 11;
  string uri = 12;
  int32 status = 13;
  string dns_query = 14;
  string dns_answer = 15;
  int32 ttl = 16;
  string tcp_flags = 17;
}

message RegisterRequest {
  string master_key = 1;
  string sniffer_id = 2;
  string session_key = 3;
}

message RegisterResponse {
  bool success = 1;
  string session_key = 2;
  string message = 3;
  string server_certificate = 4;
}

message StatsRequest {
  string session_key = 1;
  string period = 2;
}

message StatsResponse {
  int64 packets_count = 1;
  int64 bytes_total = 2;
  map<string, int64> protocols = 3;
  map<string, int64> applications = 4;
  string error = 5;
}

message PingRequest {
  string session_key = 1;
  string message = 2;
}

message PingResponse {
  string message = 1;
  int64 timestamp = 2;
}