syntax = "proto3";

package sniffer;

option go_package = "./core/grpc/proto;snifferpb";

service SnifferService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc GetStats(StatsRequest) returns (StatsResponse);
  rpc Ping(PingRequest) returns (PingResponse);
}

message RegisterRequest {
  string master_key = 1;
  string sniffer_id = 2;
}

message RegisterResponse {
  bool success = 1;
  string session_key = 2;
  string message = 3;
}

message StatsRequest {
  string session_key = 1;
  string period = 2;
}

message StatsResponse {
  int64 packets_count = 1;
  int64 bytes_total = 2;
  map<string, int64> protocols = 3;
  map<string, int64> applications = 4;
  string error = 5;
}

message PingRequest {
  string session_key = 1;
  string message = 2;
}

message PingResponse {
  string message = 1;
  int64 timestamp = 2;
}