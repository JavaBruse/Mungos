name: mungos-sniffer

services:
  clickhouse-sniffer:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: mungos-clickhouse-sniffer
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${SNIFFER_DB_NAME}
      CLICKHOUSE_USER: ${SNIFFER_DB_USER}
      CLICKHOUSE_PASSWORD: ${SNIFFER_DB_PASS}
    volumes:
      - clickhouse-sniffer-data:/var/lib/clickhouse
    expose:
      - "8123"  # HTTP порт
      - "9000"  # Native порт
    networks:
      - sniffer-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  sniffer-app:
    build:
      context: ../sniffer
      dockerfile: Dockerfile
    container_name: mungos-sniffer
    depends_on:
      clickhouse-sniffer:
        condition: service_healthy
    restart: unless-stopped
    environment:
      DB_TYPE: CLICKHOUSE  # Добавьте поддержку в приложение
      DB_HOST: ${SNIFFER_DB_HOST}
      DB_PORT: ${SNIFFER_DB_PORT}
      DB_USER: ${SNIFFER_DB_USER}
      DB_PASS: ${SNIFFER_DB_PASS}
      DB_NAME: ${SNIFFER_DB_NAME}
      DB_PROTOCOL: ${SNIFFER_DB_PROTOCOL:-http}  # http или native
    ports:
      - "${SNIFFER_APP_PORT}:8080"
    networks:
      - sniffer-network
      - mungos-shared
    develop:
    watch:
      - action: rebuild
        path: ../sniffer
        ignore:
          - tmp/
          - vendor/
          - "*.log"

networks:
  sniffer-network:
    driver: bridge
  mungos-shared:
    name: mungos-shared-network
    external: false

volumes:
  clickhouse-sniffer-data:
    name: mungos_clickhouse_sniffer-data