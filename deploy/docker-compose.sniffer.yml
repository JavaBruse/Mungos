version: '3.8'

x-variables: &sniffer-defaults
  DB_NAME: mungos_sniffer
  DB_USER: mungos
  DB_PASS: mungos123
  DB_HOST: postgres-sniffer
  DB_PORT: 5432

services:
  postgres-sniffer:
    image: postgres:16-alpine
    container_name: mungos-postgres-sniffer
    restart: unless-stopped
    environment:
      POSTGRES_DB: *DB_NAME
      POSTGRES_USER: *DB_USER
      POSTGRES_PASSWORD: *DB_PASS
    volumes:
      - postgres-sniffer-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - sniffer-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mungos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  sniffer-app:
    build:
      context: ../sniffer
      dockerfile: Dockerfile
    container_name: mungos-sniffer-app
    depends_on:
      postgres-sniffer:
        condition: service_healthy
    environment:
      DB_HOST: *DB_HOST
      DB_PORT: *DB_PORT
      DB_USER: *DB_USER
      DB_PASS: *DB_PASS
      DB_NAME: *DB_NAME
    ports:
      - "8081:8080"
    networks:
      - sniffer-network

networks:
  sniffer-network:
    driver: bridge

volumes:
  postgres-sniffer-data: