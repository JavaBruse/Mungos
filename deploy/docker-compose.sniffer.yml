version: '3.8'
name: mungos-sniffer

services:
  postgres-sniffer:
    image: postgres:16-alpine
    container_name: mungos-postgres-sniffer
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SNIFFER_DB_NAME}
      POSTGRES_USER: ${SNIFFER_DB_USER}
      POSTGRES_PASSWORD: ${SNIFFER_DB_PASS}
    volumes:
      - postgres-sniffer-data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - sniffer-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SNIFFER_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  sniffer-app:
    build:
      context: ../sniffer
      dockerfile: Dockerfile
    container_name: mungos-sniffer-app
    image: mungos-sniffer-app
    depends_on:
      postgres-sniffer:
        condition: service_healthy
    restart: unless-stopped
    environment:
      DB_HOST: ${SNIFFER_DB_HOST}
      DB_PORT: ${SNIFFER_DB_PORT}
      DB_USER: ${SNIFFER_DB_USER}
      DB_PASS: ${SNIFFER_DB_PASS}
      DB_NAME: ${SNIFFER_DB_NAME}
    ports:
      - "${SNIFFER_APP_PORT}:8080"
    networks:
      - sniffer-network
      - mungos-shared

networks:
  sniffer-network:
    driver: bridge
  mungos-shared:
    name: mungos-shared-network
    external: false        

volumes:
  postgres-sniffer-data:
    name: mungos_sniffer_postgres-data