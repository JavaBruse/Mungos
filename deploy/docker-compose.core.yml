version: '3.8'

x-variables: &defaults
  DB_NAME: mungos_core
  DB_USER: mungos
  DB_PASS: mungos123
  DB_HOST: postgres-core
  DB_PORT: 5432
  SPRING_PROFILES_ACTIVE: docker

services:
  postgres-core:
    image: postgres:16-alpine
    container_name: mungos-postgres-core
    environment:
      POSTGRES_DB: *DB_NAME
      POSTGRES_USER: *DB_USER
      POSTGRES_PASSWORD: *DB_PASS
    volumes:
      - postgres-core-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - core-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mungos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  core-app:
    build:
      context: ../core
      dockerfile: Dockerfile
    container_name: mungos-core
    depends_on:
      postgres-core:
        condition: service_healthy
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: *SPRING_PROFILES_ACTIVE
      DB_HOST: *DB_HOST
      DB_PORT: *DB_PORT
      DB_NAME: *DB_NAME
      DB_USER: *DB_USER
      DB_PASS: *DB_PASS
    ports:
      - "8080:8080"
    networks:
      - core-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: mungos-frontend
    image: front
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - core-network

  prometheus:
    image: prom/prometheus:latest
    container_name: mungos-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - core-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

networks:
  core-network:
    driver: bridge

volumes:
  postgres-core-data:
  prometheus-data: